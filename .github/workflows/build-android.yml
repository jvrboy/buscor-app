name: Build Unsigned Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      app_version:
        description: "App version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number (integer)"
        required: false
        default: "6"
        type: string

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}
  APP_VERSION: ${{ inputs.app_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '6' }}

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Unsigned APK (${{ env.BUILD_TYPE }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Buscor</title><style>*{margin:0;padding:0}body{background:#004C97}</style></head><body></body></html>' > www/index.html
          cat > capacitor.config.json <<'CAPCFG'
          {
            "appId": "za.co.buscor.app",
            "appName": "Buscor",
            "webDir": "www",
            "server": {
              "url": "${{ inputs.server_url }}",
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#004C97",
                "showSpinner": false,
                "androidScaleType": "CENTER_CROP",
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": {
                "style": "LIGHT",
                "backgroundColor": "#003A75"
              }
            }
          }
          CAPCFG

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply Buscor branding
        run: |
          echo "📱 Applying Buscor production branding..."
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          cp -Rf mobile-resources/android/app/src/main/res/* android/app/src/main/res/
          sed -i "s/versionCode [0-9]*/versionCode ${{ env.BUILD_NUMBER }}/" android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ env.APP_VERSION }}"/' android/app/build.gradle
          sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">Buscor<\/string>/' android/app/src/main/res/values/strings.xml
          echo "  ✅ Branding applied: v${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})"

      - name: Build unsigned APK
        working-directory: android
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --warning-mode=none
          else
            ./gradlew assembleDebug --no-daemon --warning-mode=none
          fi

      - name: Package APK artifact
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          ARTIFACT_NAME="buscor-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.apk"
          cp "$APK_PATH" "$ARTIFACT_NAME"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "APK_SIZE=$(du -h "$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.BUILD_TYPE }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
          if-no-files-found: error