name: Build Unsigned Android APK

on:
  push:
    branches: [main, develop, "release/*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      api_base_url:
        description: "API base URL (leave empty for production)"
        required: false
        default: ""
        type: string

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Unsigned APK (${{ env.BUILD_TYPE }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Install root dependencies
        run: npm install

      - name: Install Capacitor dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          npm install @capacitor/splash-screen @capacitor/status-bar

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.api_base_url || '' }}
          NEXT_PUBLIC_MOBILE: "true"
        run: |
          # Override output to static for mobile build
          npx next build -o out

      - name: Add Android platform
        run: npx cap add android
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build unsigned APK (${{ env.BUILD_TYPE }})
        working-directory: android
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=/dev/null \
              --no-daemon \
              --warning-mode=none
          else
            ./gradlew assembleDebug \
              --no-daemon \
              --warning-mode=none
          fi

      - name: Rename APK artifact
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="buscor-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.apk"

          cp "$APK_PATH" "$ARTIFACT_NAME"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "APK_SIZE=$(du -h "$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.BUILD_TYPE }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "## 🤖 Android Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Type** | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ env.ARTIFACT_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | ${{ env.APK_SIZE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Unsigned** | ✅ Yes (requires signing for distribution) |" >> "$GITHUB_STEP_SUMMARY"

  # Optional: Run linting and type checks in parallel
  quality-check:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true