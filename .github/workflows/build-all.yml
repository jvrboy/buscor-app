name: Build All Mobile Platforms

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL (the native app will load this)"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      xcode_version:
        description: "Xcode version (iOS only)"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: mobile-build-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Android Build ───
  build-android:
    name: 🤖 Build Unsigned APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Buscor</title></head><body></body></html>' > www/index.html
          echo '{"appId":"za.co.buscor.app","appName":"Buscor","webDir":"www","server":{"url":"${{ inputs.server_url || 'https://buscor-app.vercel.app' }}","androidScheme":"https","cleartext":true}}' > capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build unsigned APK
        working-directory: android
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --warning-mode=none
          else
            ./gradlew assembleDebug --no-daemon --warning-mode=none
          fi

      - name: Package APK artifact
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          DEST="buscor-android-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.apk"
          cp "$SRC" "$DEST"
          echo "ANDROID_ARTIFACT=$DEST" >> "$GITHUB_ENV"
          echo "ANDROID_SIZE=$(du -h "$DEST" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.ANDROID_ARTIFACT }}
          retention-days: 30
          if-no-files-found: error

  # ─── iOS Build ───
  build-ios:
    name: 🍎 Build Unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Buscor</title></head><body></body></html>' > www/index.html
          echo '{"appId":"za.co.buscor.app","appName":"Buscor","webDir":"www","server":{"url":"${{ inputs.server_url || 'https://buscor-app.vercel.app' }}","androidScheme":"https","cleartext":true},"ios":{"contentInset":"automatic"}}' > capacitor.config.json

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          CONFIG="${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}"
          DERIVED="$RUNNER_TEMP/derived_data"

          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration "$CONFIG" \
            -derivedDataPath "$DERIVED" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ inputs.ios_deployment_target || '15.0' }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -skipPackageUpdates \
            clean build 2>&1 | tee "$DERIVED/build.log"
          
          echo "Build completed. Checking for .app bundle..."
          find "$DERIVED/Build/Products" -name "*.app" -type d -exec ls -la {} \;
          echo "Build log (errors):"
          rg -i "error:" "$DERIVED/build.log" || echo "No errors found in log"

      - name: Package IPA
        run: |
          APP_BUNDLE=$(find "$RUNNER_TEMP/derived_data/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_BUNDLE" "$RUNNER_TEMP/ipa/Payload/"

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          IPA_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"

          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/$IPA_NAME" Payload/
          echo "IOS_ARTIFACT=$IPA_NAME" >> "$GITHUB_ENV"
          echo "IOS_SIZE=$(du -h "$RUNNER_TEMP/$IPA_NAME" | cut -f1)" >> "$GITHUB_ENV"
          echo "IOS_PATH=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IOS_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore

  # ─── Final Summary ───
  build-summary:
    name: 📋 Build Summary
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🚌 Buscor Mobile Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status | Build Type |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🤖 Android | \`${{ needs.build-android.result }}\` | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🍎 iOS | \`${{ needs.build-ios.result }}\` | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK**: \`android-apk\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- **IPA**: \`ios-ipa\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dSYM**: \`ios-dsym\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ **Unsigned** — sign before distribution" >> "$GITHUB_STEP_SUMMARY"