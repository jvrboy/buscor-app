name: Build All Mobile Platforms

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL (the native app will load this)"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      app_version:
        description: "App version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number (integer)"
        required: false
        default: "6"
        type: string

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}
  APP_VERSION: ${{ inputs.app_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '6' }}

concurrency:
  group: mobile-build-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Android Build ───
  build-android:
    name: 🤖 Build Unsigned APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Buscor</title><style>*{margin:0;padding:0}body{background:#004C97}</style></head><body></body></html>' > www/index.html
          cat > capacitor.config.json <<'CAPCFG'
          {
            "appId": "za.co.buscor.app",
            "appName": "Buscor",
            "webDir": "www",
            "server": {
              "url": "${{ inputs.server_url || 'https://buscor-app.vercel.app' }}",
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#004C97",
                "showSpinner": false,
                "androidScaleType": "CENTER_CROP",
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": {
                "style": "LIGHT",
                "backgroundColor": "#003A75"
              }
            }
          }
          CAPCFG

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply Buscor branding
        run: |
          echo "📱 Applying Buscor production branding..."
          
          # Remove duplicate ic_launcher_background generated by Capacitor
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          
          # Copy icons, splash, adaptive icons, colors, strings (NOT styles.xml)
          for dir in mipmap-* drawable-* values; do
            if [ -d "mobile-resources/android/app/src/main/res/$dir" ]; then
              cp -Rf "mobile-resources/android/app/src/main/res/$dir/"* "android/app/src/main/res/$dir/" 2>/dev/null || true
            fi
          done
          echo "  ✅ Icons, splash, colors, adaptive icons copied"
          
          # Update version in build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ env.BUILD_NUMBER }}/" android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ env.APP_VERSION }}"/' android/app/build.gradle
          echo "  ✅ Version: ${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})"
          
          # Ensure app name
          sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">Buscor<\/string>/' android/app/src/main/res/values/strings.xml
          echo "  ✅ Branding applied"

      - name: Build unsigned APK
        working-directory: android
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --warning-mode=none
          else
            ./gradlew assembleDebug --no-daemon --warning-mode=none
          fi

      - name: Package APK artifact
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          DEST="buscor-android-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.apk"
          cp "$SRC" "$DEST"
          echo "ANDROID_ARTIFACT=$DEST" >> "$GITHUB_ENV"
          echo "ANDROID_SIZE=$(du -h "$DEST" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.ANDROID_ARTIFACT }}
          retention-days: 30
          if-no-files-found: error

  # ─── iOS Build ───
  build-ios:
    name: 🍎 Build Unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Buscor</title><style>*{margin:0;padding:0}body{background:#004C97}</style></head><body></body></html>' > www/index.html
          cat > capacitor.config.json <<'CAPCFG'
          {
            "appId": "za.co.buscor.app",
            "appName": "Buscor",
            "webDir": "www",
            "server": {
              "url": "${{ inputs.server_url || 'https://buscor-app.vercel.app' }}",
              "androidScheme": "https",
              "cleartext": true
            },
            "ios": {
              "contentInset": "automatic"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#004C97",
                "showSpinner": false,
                "iosScaleType": "CENTER_CROP",
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": {
                "style": "LIGHT"
              }
            }
          }
          CAPCFG

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Apply Buscor branding
        run: |
          echo "🍎 Applying Buscor production branding..."
          
          # Copy app icons
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp -R mobile-resources/ios/App/App/Assets.xcassets/AppIcon.appiconset ios/App/App/Assets.xcassets/
          echo "  ✅ AppIcon assets copied"
          
          # Update Info.plist
          PLIST="ios/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Buscor" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Buscor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.APP_VERSION }}" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${{ env.APP_VERSION }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.BUILD_NUMBER }}" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ env.BUILD_NUMBER }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :UIStatusBarStyle UIStatusBarStyleLightContent" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :UIStatusBarStyle string UIStatusBarStyleLightContent" "$PLIST"
          echo "  ✅ Info.plist: v${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})"
          
          # Update Xcode project settings
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.APP_VERSION }}/g" "$PBXPROJ"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ env.BUILD_NUMBER }}/g" "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*/PRODUCT_BUNDLE_IDENTIFIER = za.co.buscor.app/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_NAME = [^;]*/PRODUCT_NAME = Buscor/g' "$PBXPROJ"
          echo "  ✅ Xcode project settings updated"
          
          # Fix empty SUPPORTED_PLATFORMS if present
          if grep -q 'SUPPORTED_PLATFORMS = ""' "$PBXPROJ"; then
            sed -i '' 's/SUPPORTED_PLATFORMS = ""/SUPPORTED_PLATFORMS = "iphoneos iphonesimulator"/' "$PBXPROJ"
            echo "  ✅ Fixed SUPPORTED_PLATFORMS"
          fi

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          CONFIG="${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}"
          DERIVED="$RUNNER_TEMP/derived_data"

          set -o pipefail
          
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration "$CONFIG" \
            -derivedDataPath "$DERIVED" \
            SUPPORTED_PLATFORMS="iphoneos iphonesimulator" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -skipPackageUpdates \
            clean build 2>&1 | tee "$DERIVED/build.log"
          
          echo "Build completed. Checking for .app bundle..."
          find "$DERIVED/Build/Products" -name "*.app" -type d -exec ls -la {} \;
          echo "Build log (errors):"
          rg -i "error:" "$DERIVED/build.log" || echo "No errors found in log"

      - name: Package IPA
        run: |
          APP_BUNDLE=$(find "$RUNNER_TEMP/derived_data/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_BUNDLE" "$RUNNER_TEMP/ipa/Payload/"

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          IPA_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"

          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/$IPA_NAME" Payload/
          echo "IOS_ARTIFACT=$IPA_NAME" >> "$GITHUB_ENV"
          echo "IOS_SIZE=$(du -h "$RUNNER_TEMP/$IPA_NAME" | cut -f1)" >> "$GITHUB_ENV"
          echo "IOS_PATH=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IOS_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore

  # ─── Final Summary ───
  build-summary:
    name: 📋 Build Summary
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🚌 Buscor Mobile Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status | Version | Build Type |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|---------|------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🤖 Android | \`${{ needs.build-android.result }}\` | v\`${{ env.APP_VERSION }}\` (\`${{ env.BUILD_NUMBER }}\`) | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🍎 iOS | \`${{ needs.build-ios.result }}\` | v\`${{ env.APP_VERSION }}\` (\`${{ env.BUILD_NUMBER }}\`) | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Branding" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Custom Buscor app icon on all platforms" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Custom splash screen with Buscor branding" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Adaptive Android icons (API 26+)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Status bar: Light on dark blue" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK**: \`android-apk\` artifact (\`${{ needs.build-android.result == 'success' && '✅' || '❌' }}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **IPA**: \`ios-ipa\` artifact (\`${{ needs.build-ios.result == 'success' && '✅' || '❌' }}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dSYM**: \`ios-dsym\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ **Unsigned** — sign before distribution" >> "$GITHUB_STEP_SUMMARY"