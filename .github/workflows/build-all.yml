name: Build All Mobile Platforms

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      api_base_url:
        description: "API base URL (leave empty for production)"
        required: false
        default: ""
        type: string
      xcode_version:
        description: "Xcode version (iOS only)"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: mobile-build-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Shared: Build the Next.js static export once ───
  build-web:
    name: Build Web (Static Export)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android @capacitor/ios
          npm install @capacitor/splash-screen @capacitor/status-bar

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.api_base_url || '' }}
          NEXT_PUBLIC_MOBILE: "true"
        run: npx next build -o out

      - name: Upload static export artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static-export
          path: |
            out/
            capacitor.config.ts
            package.json
            package-lock.json
          retention-days: 1

  # ─── Android Build ───
  build-android:
    name: 🤖 Build Unsigned APK
    needs: build-web
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: web-static-export
          path: .

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build unsigned APK
        working-directory: android
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --warning-mode=none
          else
            ./gradlew assembleDebug --no-daemon --warning-mode=none
          fi

      - name: Package APK artifact
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          DEST="buscor-android-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.apk"
          cp "$SRC" "$DEST"
          echo "ANDROID_ARTIFACT=$DEST" >> "$GITHUB_ENV"
          echo "ANDROID_SIZE=$(du -h "$DEST" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.ANDROID_ARTIFACT }}
          retention-days: 30
          if-no-files-found: error

  # ─── iOS Build ───
  build-ios:
    name: 🍎 Build Unsigned IPA
    needs: build-web
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version || '16.0' }}

      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: web-static-export
          path: .

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: gem install cocoapods --no-document || true

      - name: Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Update iOS deployment target
        run: |
          PODFILE="ios/App/Podfile"
          if [ -f "$PODFILE" ]; then
            sed -i '' "s/platform :ios, '[^']*'/platform :ios, '${{ inputs.ios_deployment_target || '15.0' }}'/" "$PODFILE"
          fi

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          CONFIG="${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}"
          DERIVED="$RUNNER_TEMP/derived_data"

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration "$CONFIG" \
            -derivedDataPath "$DERIVED" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ inputs.ios_deployment_target || '15.0' }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates \
            clean build \
          | xcpretty --color || true

      - name: Package IPA
        run: |
          APP_BUNDLE=$(find "$RUNNER_TEMP/derived_data/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            find "$RUNNER_TEMP/derived_data/Build/Products" -type f -name "*.app" 2>/dev/null || true
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_BUNDLE" "$RUNNER_TEMP/ipa/Payload/"

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          IPA_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"

          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/$IPA_NAME" Payload/
          echo "IOS_ARTIFACT=$IPA_NAME" >> "$GITHUB_ENV"
          echo "IOS_SIZE=$(du -h "$RUNNER_TEMP/$IPA_NAME" | cut -f1)" >> "$GITHUB_ENV"
          echo "IOS_PATH=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IOS_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore

  # ─── Final Summary ───
  build-summary:
    name: 📋 Build Summary
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🚌 Buscor Mobile Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status | Build Type |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🤖 Android | \`${{ needs.build-android.result }}\` | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🍎 iOS | \`${{ needs.build-ios.result }}\` | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Download Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK**: Download from the \`android-apk\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- **IPA**: Download from the \`ios-ipa\` artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dSYM**: Download from the \`ios-dsym\` artifact (iOS crash symbols)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ Both builds are **unsigned**. You will need to sign them before distribution:" >> "$GITHUB_STEP_SUMMARY"
          echo "> - Android: Use \`apksigner\` or Android App Bundle in Google Play Console" >> "$GITHUB_STEP_SUMMARY"
          echo "> - iOS: Use Xcode, \`codesign\`, or upload to App Store Connect" >> "$GITHUB_STEP_SUMMARY"
          echo "> - Alternatively, use services like EAS Build, Codemagic, or Bitrise for signed builds" >> "$GITHUB_STEP_SUMMARY"