name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      xcode_version:
        description: "Xcode version"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string

env:
  NODE_VERSION: "22"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build Unsigned IPA (${{ env.BUILD_TYPE }})
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version || '16.0' }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Buscor</title></head><body></body></html>' > www/index.html
          echo '{"appId":"za.co.buscor.app","appName":"Buscor","webDir":"www","server":{"url":"${{ inputs.server_url }}","androidScheme":"https","cleartext":true},"ios":{"contentInset":"automatic"}}' > capacitor.config.json

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          CONFIG="${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}"
          DERIVED="$RUNNER_TEMP/derived_data"

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration "$CONFIG" \
            -derivedDataPath "$DERIVED" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ inputs.ios_deployment_target || '15.0' }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates \
            -skipPackageUpdates \
            clean build \
          | xcpretty --color || true

      - name: Package IPA
        run: |
          APP_BUNDLE=$(find "$RUNNER_TEMP/derived_data/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_BUNDLE" "$RUNNER_TEMP/ipa/Payload/"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          ARTIFACT_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/$ARTIFACT_NAME" Payload/
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(du -h "$RUNNER_TEMP/$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ env.BUILD_TYPE }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym-${{ env.BUILD_TYPE }}
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore