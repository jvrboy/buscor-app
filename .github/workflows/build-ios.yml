name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      xcode_version:
        description: "Xcode version"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string

env:
  NODE_VERSION: "22"
  XCODE_VERSION: ${{ inputs.xcode_version || '16.0' }}
  IOS_DEPLOYMENT_TARGET: ${{ inputs.ios_deployment_target || '15.0' }}
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build Unsigned IPA (${{ env.BUILD_TYPE }})
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/splash-screen @capacitor/status-bar

      - name: Install CocoaPods
        run: gem install cocoapods --no-document || true

      - name: Prepare web directory
        run: |
          mkdir -p www
          cat > www/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Buscor</title></head>
          <body></body>
          </html>
          HTMLEOF

      - name: Configure Capacitor for server URL
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from "@capacitor/cli";
          const config: CapacitorConfig = {
            appId: "za.co.buscor.app",
            appName: "Buscor",
            webDir: "www",
            server: {
              url: "${{ inputs.server_url }}",
              androidScheme: "https",
              cleartext: true,
            },
            plugins: {
              SplashScreen: {
                launchShowDuration: 2000,
                backgroundColor: "#00A651",
                showSpinner: false,
                androidScaleType: "CENTER_CROP",
              },
              StatusBar: {
                style: "LIGHT",
                backgroundColor: "#00A651",
              },
            },
            ios: {
              contentInset: "automatic",
            },
          };
          export default config;
          EOF

      - name: Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Update iOS deployment target
        run: |
          PODFILE="ios/App/Podfile"
          if [ -f "$PODFILE" ]; then
            sed -i '' "s/platform :ios, '[^']*'/platform :ios, '${{ env.IOS_DEPLOYMENT_TARGET }}'/" "$PODFILE"
          fi

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned IPA
        working-directory: ios/App
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            CONFIGURATION="Release"
          else
            CONFIGURATION="Debug"
          fi

          DERIVED_DATA_PATH="$RUNNER_TEMP/derived_data"

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_DEPLOYMENT_TARGET }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates \
            clean build \
            | xcpretty --color || true

      - name: Create unsigned IPA
        run: |
          DERIVED_DATA_PATH="$RUNNER_TEMP/derived_data"
          BUILD_PRODUCTS_DIR=$(find "$DERIVED_DATA_PATH/Build/Products" -name "*.app" -type d | head -1)

          if [ -z "$BUILD_PRODUCTS_DIR" ]; then
            echo "ERROR: Could not find .app bundle"
            exit 1
          fi

          PAYLOAD_DIR="$RUNNER_TEMP/ipa_build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$BUILD_PRODUCTS_DIR" "$PAYLOAD_DIR/"

          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"

          cd "$RUNNER_TEMP/ipa_build"
          zip -r "$RUNNER_TEMP/$ARTIFACT_NAME" Payload/
          rm -rf "$RUNNER_TEMP/ipa_build"

          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(du -h "$RUNNER_TEMP/$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"
          echo "IPA_PATH=$RUNNER_TEMP/$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ env.BUILD_TYPE }}
          path: ${{ env.IPA_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols (if available)
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym-${{ env.BUILD_TYPE }}
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore

      - name: Build summary
        run: |
          echo "## 🍎 iOS Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Type** | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ env.ARTIFACT_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | ${{ env.IPA_SIZE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Server URL** | \`${{ inputs.server_url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Xcode** | \`${{ env.XCODE_VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Min iOS** | \`${{ env.IOS_DEPLOYMENT_TARGET }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Unsigned** | ✅ Yes (requires signing for distribution) |" >> "$GITHUB_STEP_SUMMARY"