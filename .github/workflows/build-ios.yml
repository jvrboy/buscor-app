name: Build Unsigned iOS IPA

on:
  push:
    branches: [main, develop, "release/*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      api_base_url:
        description: "API base URL (leave empty for production)"
        required: false
        default: ""
        type: string
      xcode_version:
        description: "Xcode version"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string

env:
  NODE_VERSION: "20"
  XCODE_VERSION: ${{ inputs.xcode_version || '16.0' }}
  IOS_DEPLOYMENT_TARGET: ${{ inputs.ios_deployment_target || '15.0' }}
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build Unsigned IPA (${{ env.BUILD_TYPE }})
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Install Capacitor dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/ios
          npm install @capacitor/splash-screen @capacitor/status-bar

      - name: Install CocoaPods dependencies
        run: |
          gem install cocoapods --no-document || true
          # Ensure we have a compatible version
          pod --version

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ inputs.api_base_url || '' }}
          NEXT_PUBLIC_MOBILE: "true"
        run: |
          npx next build -o out

      - name: Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Update iOS deployment target
        run: |
          # Update the deployment target in the Podfile
          PODFILE="ios/App/Podfile"
          if [ -f "$PODFILE" ]; then
            sed -i '' "s/platform :ios, '[^']*'/platform :ios, '${{ env.IOS_DEPLOYMENT_TARGET }}'/" "$PODFILE"
          fi

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned IPA (${{ env.BUILD_TYPE }})
        working-directory: ios/App
        run: |
          WORKSPACE="App.xcworkspace"
          SCHEME="App"
          SDK="iphoneos"
          DERIVED_DATA_PATH="$RUNNER_TEMP/derived_data"

          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            CONFIGURATION="Release"
          else
            CONFIGURATION="Debug"
          fi

          echo "Building ${CONFIGURATION} for ${SDK}..."

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk "$SDK" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_DEPLOYMENT_TARGET }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates \
            clean build \
            | xcpretty --color || true

      - name: Create unsigned IPA
        run: |
          DERIVED_DATA_PATH="$RUNNER_TEMP/derived_data"
          BUILD_PRODUCTS_DIR=$(find "$DERIVED_DATA_PATH/Build/Products" -name "*.app" -type d | head -1)

          if [ -z "$BUILD_PRODUCTS_DIR" ]; then
            echo "ERROR: Could not find .app bundle"
            exit 1
          fi

          echo "Found .app bundle at: $BUILD_PRODUCTS_DIR"

          # Create Payload directory for IPA
          PAYLOAD_DIR="$RUNNER_TEMP/ipa_build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$BUILD_PRODUCTS_DIR" "$PAYLOAD_DIR/"

          # Zip into IPA
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="buscor-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"

          cd "$RUNNER_TEMP/ipa_build"
          zip -r "$RUNNER_TEMP/$ARTIFACT_NAME" Payload/
          rm -rf "$RUNNER_TEMP/ipa_build"

          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(du -h "$RUNNER_TEMP/$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"
          echo "IPA_PATH=$RUNNER_TEMP/$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ env.BUILD_TYPE }}
          path: ${{ env.IPA_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols (if available)
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym-${{ env.BUILD_TYPE }}
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore

      - name: Build summary
        run: |
          echo "## 🍎 iOS Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Type** | \`${{ env.BUILD_TYPE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`${{ env.ARTIFACT_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | ${{ env.IPA_SIZE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Xcode** | \`${{ env.XCODE_VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Min iOS** | \`${{ env.IOS_DEPLOYMENT_TARGET }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Unsigned** | ✅ Yes (requires signing for distribution) |" >> "$GITHUB_STEP_SUMMARY"

  # Optional: Run linting and type checks in parallel
  quality-check:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true