name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      server_url:
        description: "Deployed web app URL"
        required: true
        default: "https://buscor-app.vercel.app"
        type: string
      xcode_version:
        description: "Xcode version"
        required: false
        default: "16.0"
        type: string
      ios_deployment_target:
        description: "Minimum iOS version"
        required: false
        default: "15.0"
        type: string
      app_version:
        description: "App version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number (integer)"
        required: false
        default: "6"
        type: string

env:
  NODE_VERSION: "22"
  BUILD_TYPE: ${{ inputs.build_type || 'release' }}
  APP_VERSION: ${{ inputs.app_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '6' }}

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build Unsigned IPA (${{ env.BUILD_TYPE }})
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version || '16.0' }}

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web dir + Capacitor config
        run: |
          rm -f capacitor.config.ts
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Buscor</title><style>*{margin:0;padding:0}body{background:#004C97}</style></head><body></body></html>' > www/index.html
          cat > capacitor.config.json <<'CAPCFG'
          {
            "appId": "za.co.buscor.app",
            "appName": "Buscor",
            "webDir": "www",
            "server": {
              "url": "${{ inputs.server_url }}",
              "androidScheme": "https",
              "cleartext": true
            },
            "ios": {
              "contentInset": "automatic"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#004C97",
                "showSpinner": false,
                "iosScaleType": "CENTER_CROP",
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": {
                "style": "LIGHT"
              }
            }
          }
          CAPCFG

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Apply Buscor branding
        run: |
          echo "🍎 Applying Buscor production branding..."
          
          # Copy app icons
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp -R mobile-resources/ios/App/App/Assets.xcassets/AppIcon.appiconset ios/App/App/Assets.xcassets/
          
          # Update Info.plist
          PLIST="ios/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Buscor" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Buscor" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.APP_VERSION }}" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${{ env.APP_VERSION }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.BUILD_NUMBER }}" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ env.BUILD_NUMBER }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :UIStatusBarStyle UIStatusBarStyleLightContent" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :UIStatusBarStyle string UIStatusBarStyleLightContent" "$PLIST"
          
          # Update Xcode project
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.APP_VERSION }}/g" "$PBXPROJ"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ env.BUILD_NUMBER }}/g" "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*/PRODUCT_BUNDLE_IDENTIFIER = za.co.buscor.app/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_NAME = [^;]*/PRODUCT_NAME = Buscor/g' "$PBXPROJ"
          
          # Fix SUPPORTED_PLATFORMS
          if grep -q 'SUPPORTED_PLATFORMS = ""' "$PBXPROJ"; then
            sed -i '' 's/SUPPORTED_PLATFORMS = ""/SUPPORTED_PLATFORMS = "iphoneos iphonesimulator"/' "$PBXPROJ"
          fi
          
          echo "  ✅ Branding applied: v${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})"

      - name: Build unsigned .app
        working-directory: ios/App
        run: |
          CONFIG="${{ env.BUILD_TYPE == 'release' && 'Release' || 'Debug' }}"
          DERIVED="$RUNNER_TEMP/derived_data"

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration "$CONFIG" \
            -derivedDataPath "$DERIVED" \
            IPHONEOS_DEPLOYMENT_TARGET="${{ inputs.ios_deployment_target || '15.0' }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates \
            -skipPackageUpdates \
            clean build \
          | xcpretty --color || true

      - name: Package IPA
        run: |
          APP_BUNDLE=$(find "$RUNNER_TEMP/derived_data/Build/Products" -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_BUNDLE" "$RUNNER_TEMP/ipa/Payload/"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          ARTIFACT_NAME="buscor-ios-${{ env.BUILD_TYPE }}-${SHORT_SHA}-${TIMESTAMP}.ipa"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/$ARTIFACT_NAME" Payload/
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(du -h "$RUNNER_TEMP/$ARTIFACT_NAME" | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ env.BUILD_TYPE }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload dSYM symbols
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ios-dsym-${{ env.BUILD_TYPE }}
          path: ${{ runner.temp }}/derived_data/Build/Products/**/*.dSYM
          retention-days: 30
          if-no-files-found: ignore